<!DOCTYPE html>
<html>
<head>
    <title>Simple P2P Chat</title>
    <style>
        body { font-family: Arial; text-align:center; margin-top:40px; }
        textarea { width: 90%; height: 80px; }
        input { padding: 10px; width: 200px; }
        button { padding: 10px; margin: 5px; }
        #chat { margin-top:20px; border:1px solid #ccc; height:150px; overflow:auto; padding:10px; }
    </style>
</head>

<body>

<h2>🔗 Simple Browser-to-Browser Chat</h2>

<button onclick="createOffer()">1. Create Code</button>
<textarea id="offer" placeholder="Share this code"></textarea>

<button onclick="connect()">2. Connect</button>
<textarea id="answer" placeholder="Paste other system code"></textarea>

<hr>

<input id="msg" placeholder="Type message">
<button onclick="send()">Send</button>

<div id="chat"></div>

<script>
let pc = new RTCPeerConnection();
let dc = pc.createDataChannel("chat");

// show received messages
dc.onmessage = e => {
    addMsg("📩 " + e.data);
};

pc.onicecandidate = e => {
    if (!e.candidate) {
        document.getElementById("offer").value =
            JSON.stringify(pc.localDescription);
    }
};

function createOffer() {
    pc.createOffer().then(o => pc.setLocalDescription(o));
}

function connect() {
    const data = JSON.parse(document.getElementById("answer").value);

    pc.setRemoteDescription(data);

    if (data.type === "offer") {
        pc.ondatachannel = e => {
            dc = e.channel;
            dc.onmessage = ev => addMsg("📩 " + ev.data);
        };

        pc.createAnswer().then(a => {
            pc.setLocalDescription(a);
        });

        pc.onicecandidate = e => {
            if (!e.candidate) {
                document.getElementById("offer").value =
                    JSON.stringify(pc.localDescription);
            }
        };
    }
}

function send() {
    const msg = document.getElementById("msg").value;
    dc.send(msg);
    addMsg("📤 " + msg);
}

function addMsg(text) {
    const div = document.createElement("div");
    div.innerText = text;
    document.getElementById("chat").appendChild(div);
}
</script>

</body>
</html>
